<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Explorer Quiz — juanitaexplores.com</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sand: #F5EFE0;
    --sand-dark: #E8DEC8;
    --ink: #1C1917;
    --ink-light: #57534E;
    --teal: #0D6E5A;
    --teal-light: #E0F2EE;
    --teal-mid: #1D9E75;
    --coral: #C1440E;
    --coral-light: #FBE9E3;
    --white: #FFFFFF;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 48px;
  }

  header {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    color: var(--ink-light);
    letter-spacing: 0.02em;
  }
  .logo span { color: var(--teal); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .lang-toggle {
    display: flex;
    background: var(--sand-dark);
    border-radius: 20px;
    padding: 2px;
    gap: 2px;
  }

  .lang-btn {
    padding: 4px 10px;
    border-radius: 16px;
    border: none;
    background: transparent;
    font-size: 12px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink-light);
    cursor: pointer;
    transition: all 0.15s;
  }
  .lang-btn.active {
    background: var(--white);
    color: var(--teal);
  }

  .back-link {
    font-size: 13px;
    color: var(--ink-light);
    text-decoration: none;
    transition: color 0.15s;
  }
  .back-link:hover { color: var(--teal); }

  .card {
    background: var(--white);
    border-radius: var(--radius);
    padding: 32px;
    width: 100%;
    max-width: 560px;
    border: 1px solid var(--sand-dark);
  }

  .screen { display: none; }
  .screen.active { display: block; }

  .hero-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    line-height: 1.2;
    margin-bottom: 12px;
    color: var(--ink);
  }

  .subtitle {
    font-size: 15px;
    color: var(--ink-light);
    line-height: 1.6;
    margin-bottom: 28px;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 8px;
  }

  input[type="text"] {
    width: 100%;
    padding: 12px 16px;
    font-size: 16px;
    font-family: 'DM Sans', sans-serif;
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    background: var(--sand);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 24px;
  }
  input[type="text"]:focus { border-color: var(--teal); background: var(--white); }

  .diff-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 10px;
  }

  .diff-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 28px;
  }

  .diff-btn {
    background: var(--sand);
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .diff-btn:hover { border-color: var(--teal-mid); background: var(--teal-light); }
  .diff-btn.selected { border-color: var(--teal); background: var(--teal-light); }
  .diff-btn .diff-name { font-size: 14px; font-weight: 500; color: var(--ink); }
  .diff-btn.selected .diff-name { color: var(--teal); }
  .diff-btn .diff-meta { font-size: 11px; color: var(--ink-light); margin-top: 3px; }

  .btn-primary {
    width: 100%;
    padding: 14px;
    background: var(--teal);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 15px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .btn-primary:hover { background: #0A5A49; }
  .btn-primary:active { transform: scale(0.99); }
  .btn-primary:disabled { background: var(--sand-dark); color: var(--ink-light); cursor: default; }

  .privacy-note {
    font-size: 11px;
    color: var(--ink-light);
    text-align: center;
    margin-top: 16px;
    line-height: 1.5;
  }

  .progress-wrap {
    height: 3px;
    background: var(--sand);
    border-radius: 2px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--teal-mid);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .quiz-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .q-count {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .timer-pill {
    font-size: 13px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 20px;
    background: var(--sand);
    color: var(--ink);
    transition: background 0.3s, color 0.3s;
    min-width: 52px;
    text-align: center;
  }
  .timer-pill.urgent { background: var(--coral-light); color: var(--coral); }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    line-height: 1.4;
    color: var(--ink);
    margin-bottom: 24px;
  }

  .answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .ans-btn {
    background: var(--sand);
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    color: var(--ink);
    text-align: center;
    transition: all 0.15s;
    line-height: 1.4;
  }
  .ans-btn:hover:not(:disabled) { border-color: var(--teal-mid); background: var(--teal-light); }
  .ans-btn.correct { background: var(--teal-light); border-color: var(--teal); color: var(--teal); font-weight: 500; }
  .ans-btn.wrong { background: var(--coral-light); border-color: var(--coral); color: var(--coral); }
  .ans-btn:disabled { cursor: default; }

  .feedback-box {
    min-height: 44px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.5;
  }
  .feedback-box.correct { background: var(--teal-light); color: var(--teal); }
  .feedback-box.wrong { background: var(--coral-light); color: var(--coral); }

  .result-heading {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    margin-bottom: 6px;
  }

  .result-sub {
    font-size: 14px;
    color: var(--ink-light);
    margin-bottom: 24px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--sand);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 24px;
    font-weight: 500;
    color: var(--ink);
  }

  .lb-section {
    border: 1px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .lb-header {
    padding: 10px 16px;
    background: var(--sand);
    border-bottom: 1px solid var(--sand-dark);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-light);
  }

  .lb-row {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--sand-dark);
    font-size: 14px;
    gap: 12px;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row.mine { background: var(--teal-light); }

  .lb-rank { width: 20px; color: var(--ink-light); font-size: 12px; }
  .lb-name { flex: 1; color: var(--ink); }
  .lb-score { font-weight: 500; color: var(--ink); }

  .lb-loading {
    padding: 20px 16px;
    text-align: center;
    font-size: 13px;
    color: var(--ink-light);
  }

  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .btn-secondary {
    padding: 12px;
    background: var(--white);
    color: var(--ink);
    border: 1.5px solid var(--sand-dark);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--ink-light); }

  .score-saving {
    text-align: center;
    font-size: 12px;
    color: var(--ink-light);
    margin-bottom: 12px;
  }

  .error-msg {
    background: var(--coral-light);
    color: var(--coral);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }

  @media (max-width: 480px) {
    .card { padding: 24px 20px; }
    h1 { font-size: 26px; }
    .question-text { font-size: 19px; }
    .answers-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">juanita<span>explores</span>.com</div>
  <div class="header-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-nl" onclick="setLang('nl')">NL</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">EN</button>
    </div>
    <a class="back-link" id="back-link" href="https://juanitaexplores.com">← blog</a>
  </div>
</header>

<div class="card">

  <div id="screen-nick" class="screen active">
    <div class="hero-label" id="label-trivia">Trivia challenge</div>
    <h1 id="title-main">World Explorer Quiz</h1>
    <p class="subtitle" id="subtitle-main"></p>
    <label for="nick-input" id="label-nick"></label>
    <input type="text" id="nick-input" maxlength="20" autocomplete="off" />
    <div class="diff-label" id="label-diff"></div>
    <div class="diff-grid">
      <button class="diff-btn" data-diff="easy">
        <div class="diff-name" id="diff-easy"></div>
        <div class="diff-meta">10 · 20s</div>
      </button>
      <button class="diff-btn selected" data-diff="medium">
        <div class="diff-name" id="diff-medium"></div>
        <div class="diff-meta">15 · 15s</div>
      </button>
      <button class="diff-btn" data-diff="hard">
        <div class="diff-name" id="diff-hard"></div>
        <div class="diff-meta">20 · 10s</div>
      </button>
    </div>
    <button class="btn-primary" id="start-btn" disabled></button>
    <p class="privacy-note" id="privacy-note"></p>
  </div>

  <div id="screen-quiz" class="screen">
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-meta">
      <span class="q-count" id="q-count"></span>
      <span class="timer-pill" id="timer"></span>
    </div>
    <div class="question-text" id="question-text"></div>
    <div class="answers-grid" id="answers-grid"></div>
    <div class="feedback-box" id="feedback-box"></div>
  </div>

  <div id="screen-result" class="screen">
    <div class="hero-label" id="label-done"></div>
    <div class="result-heading" id="result-heading"></div>
    <div class="result-sub" id="result-sub"></div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-label" id="label-score"></div><div class="stat-value" id="res-score">0</div></div>
      <div class="stat-card"><div class="stat-label" id="label-correct"></div><div class="stat-value" id="res-correct">0/0</div></div>
      <div class="stat-card"><div class="stat-label" id="label-streak"></div><div class="stat-value" id="res-streak">0</div></div>
      <div class="stat-card"><div class="stat-label" id="label-time"></div><div class="stat-value" id="res-time">0s</div></div>
    </div>
    <div class="lb-section">
      <div class="lb-header">Leaderboard — <span id="lb-diff-label"></span></div>
      <div id="lb-body"></div>
    </div>
    <div class="score-saving" id="score-saving"></div>
    <div class="error-msg" id="error-msg"></div>
    <div class="action-row">
      <button class="btn-secondary" id="btn-back" onclick="goToNick()"></button>
      <button class="btn-primary" id="btn-again" onclick="restart()"></button>
    </div>
  </div>

</div>

<script>
const API_BASE = 'https://quiz-eight-khaki-53.vercel.app/api/quiz-score';

const QUESTIONS = {
    nl: [
    {q:"Wat is de hoofdstad van Noorwegen?", a:["Bergen","Oslo","Stavanger","Trondheim"], c:1, hint:"Oslo ligt aan het Oslofjord in het zuidoosten van het land."},
    {q:"In welk gebouw vergadert het Noorse parlement?", a:["Het Koninklijk Paleis","Het Rådhuset","Het Stortinget","De Akershus-vesting"], c:2, hint:"Het Stortinget is vernoemd naar het Noorse woord voor 'grote vergadering'."},
    {q:"Waarvoor is de wijk Bryggen in Bergen beroemd?", a:["Moderne architectuur","Historische houten handelshuizen uit de Hanzetijd","Het grootste aquarium van Scandinavië","De oudste universiteit van Noorwegen"], c:1, hint:"De kleurrijke houten huizen staan al sinds de 14e eeuw aan de haven."},
    {q:"Wat is de UNESCO-status van Bryggen in Bergen?", a:["Werelderfgoed","Biosfeerreservaat","Geopark","Immaterieel erfgoed"], c:0, hint:"Bryggen werd in 1979 op de Werelderfgoedlijst geplaatst."},
    {q:"Hoeveel dagen per jaar regent het minimaal in Bergen?", a:["100","150","200","275"], c:2, hint:"Bergen is een van de natste steden van Europa."},
    {q:"Wat is een fjord?", a:["Een vulkanisch meer","Een smalle, diepe zeearm tussen steile rotswanden","Een rivierdelta","Een kunstmatig kanaal"], c:1, hint:"Fjorden zijn gevormd door gletsjers tijdens de ijstijden."},
    {q:"Welke vesting ligt in Oslo aan het water?", a:["Bergenhus","Fredriksten","Akershus","Oscarsborg"], c:2, hint:"Deze middeleeuwse vesting werd rond 1299 gebouwd."},
    {q:"Waarvoor is het operagebouw van Oslo bekend?", a:["Het oudste theater van Europa","Een dak waarop je kunt lopen","Het is volledig van hout","Het staat op een eiland"], c:1, hint:"Het gebouw lijkt alsof het uit het water oprijst."},
    {q:"Welke stad is het startpunt van de beroemde Flåmsbana-trein?", a:["Bergen","Stavanger","Flåm","Geiranger"], c:2, hint:"De Flåmsbana is een van de steilste spoorlijnen ter wereld."},
    {q:"Hoe komen passagiers aan wal in Geiranger als grote schepen niet kunnen aanmeren?", a:["Via een helikopter","Met tenderbootjes","Ze zwemmen","Via een kabelbaan"], c:1, hint:"Kleine bootjes pendelen tussen schip en kade."},
    {q:"Welke stad had een actief Hanzeverbond, hoewel ze officieel geen Hanzestad was?", a:["Oslo","Stavanger","Trondheim","Bergen"], c:3, hint:"Het Hansekontor in Bergen was een van de belangrijkste buitenposten."},
    {q:"Welk product is Stavanger historisch vooral mee verbonden?", a:["Vis en olie-industrie","Textiel","Mijnbouw","Houthandel"], c:0, hint:"Stavanger wordt ook wel de oliehoofdstad van Noorwegen genoemd."},
    {q:"Waar staat Kristiansand om bekend als vakantiebestemming?", a:["Skigebieden","Dierenpark en stranden","Gletsjers","Noorderlicht"], c:1, hint:"Kristiansand Dyrepark is een van de populairste attracties van Noorwegen."},
    {q:"Hoe wordt de kustlijn van Noorwegen gekenmerkt?", a:["Lange zandstranden","Steile kliffen en duizenden fjorden","Koraalriffen","Mangrovebossen"], c:1, hint:"Noorwegen heeft meer dan 1.000 fjorden langs de kust."},
    {q:"Wat is de valuta van Noorwegen?", a:["Euro","Deense kroon","Noorse kroon","Zweedse kroon"], c:2, hint:"Noorwegen is geen lid van de Europese Unie."},
    {q:"Welke historische slag vond plaats in de haven van Bergen?", a:["Slag bij Jutland","Slag bij Vågen","Slag bij Narvik","Slag bij Hafrsfjord"], c:1, hint:"In 1665 vochten de Engelsen en Nederlanders in de haven van Bergen."},
    {q:"Wat is het Rådhuset in Oslo?", a:["Het operahuis","Het stadhuis","Het parlement","Het koninklijk paleis"], c:1, hint:"Hier wordt elk jaar de Nobelprijs voor de Vrede uitgereikt."},
    {q:"Hoe worden universiteiten in Noorwegen gefinancierd?", a:["Volledig privaat","Hoge collegegelden","Grotendeels gratis studeren","Alleen gratis voor Scandinaviërs"], c:2, hint:"Noorwegen investeert zwaar in publiek onderwijs."},
    {q:"Wat is de Flåmsbana?", a:["Een kabelbaan","Een van de steilste spoorlijnen ter wereld","Een fjordcruise","Een wandelpad"], c:1, hint:"De trein daalt 866 meter in slechts 20 kilometer."},
    {q:"Wat is het bekendste exportproduct van Noorwegen?", a:["Tulpen","Aardolie en aardgas","Kaas","Auto's"], c:1, hint:"De Noorse olierijkdom wordt beheerd via 's werelds grootste staatsfonds."},
    {q:"In welke zeeën bevindt zich de Noorse kustlijn?", a:["Middellandse Zee","Noordzee en Noorse Zee","Oostzee","Alleen de Atlantische Oceaan"], c:1, hint:"De Noorse kust strekt zich uit van de Noordzee tot ver boven de poolcirkel."},
    {q:"Hoe heet het traditionele houten kerktype in Noorwegen?", a:["Basiliek","Staafkerk (stavkirke)","Kapel","Kathedraal"], c:1, hint:"Er staan nog ongeveer 28 staafkerken in Noorwegen."},
    {q:"Hoeveel inwoners heeft Noorwegen bij benadering?", a:["2,5 miljoen","5,5 miljoen","8 miljoen","12 miljoen"], c:1, hint:"Het is een van de dunstbevolkte landen van Europa."},
    {q:"Welk Noors fjordgebied staat op de UNESCO Werelderfgoedlijst?", a:["Oslofjord","Hardangerfjord","Geirangerfjord en Nærøyfjord","Sognefjord"], c:2, hint:"Deze twee fjorden werden in 2005 gezamenlijk erkend."},
    {q:"In welke Noorse stad vind je het historische fort Bergenhus?", a:["Oslo","Stavanger","Bergen","Trondheim"], c:2, hint:"Bergenhus is een van de oudste en best bewaarde forten van Noorwegen."},
    {q:"In welke Italiaanse regio ligt Genova?", a:["Toscane","Ligurië","Lombardije","Piëmont"], c:1, hint:"Ligurië is de smalle kuststrook aan de Italiaanse Rivièra."},
    {q:"Waarvoor staat Civitavecchia vooral bekend voor cruisetoeristen?", a:["Het is de havenstad voor Rome","Het grootste strand van Italië","Geboorteplaats van Michelangelo","Een ski-oord"], c:0, hint:"Rome ligt ongeveer 80 kilometer landinwaarts."},
    {q:"Op welk eiland ligt Messina?", a:["Sardinië","Elba","Sicilië","Capri"], c:2, hint:"Messina ligt aan de straat die Sicilië van het vasteland scheidt."},
    {q:"Welke vulkaan is zichtbaar vanuit Taormina?", a:["De Vesuvius","De Stromboli","De Etna","De Vulcano"], c:2, hint:"De Etna is de hoogste actieve vulkaan van Europa."},
    {q:"Wat scheidt Messina van het Italiaanse vasteland?", a:["Het Kanaal van Otranto","De Straat van Messina","De Golf van Napels","Het Kanaal van Sicilië"], c:1, hint:"De straat is op het smalste punt slechts 3 kilometer breed."},
    {q:"Waarvoor is Taormina wereldwijd bekend?", a:["Een oud Grieks theater met uitzicht op zee en de Etna","De grootste markt van Sicilië","Een beroemde universiteit","Een middeleeuwse vesting op zee"], c:0, hint:"Het theater dateert uit de 3e eeuw voor Christus."},
    {q:"Welke Duitse schrijver heeft een pad naar zich vernoemd in Taormina?", a:["Friedrich Schiller","Thomas Mann","Johann Wolfgang von Goethe","Heinrich Heine"], c:2, hint:"Goethe maakte in 1787 zijn beroemde Italiaanse reis."},
    {q:"Wat is de hoofdstad van Sicilië?", a:["Catania","Messina","Palermo","Siracusa"], c:2, hint:"Palermo ligt aan de noordwestkust van het eiland."},
    {q:"Welke stad is de geboorteplaats van Christoffel Columbus?", a:["Venetië","Napels","Genova","Rome"], c:2, hint:"Columbus werd rond 1451 geboren in deze Ligurische havenstad."},
    {q:"Wat is de valuta in Italië?", a:["Lire","Euro","Franc","Pond"], c:1, hint:"Italië stapte in 2002 over van de lire naar de euro."},

  en: [
    {q:"What is the capital of Norway?", a:["Bergen","Oslo","Stavanger","Trondheim"], c:1, hint:"Oslo is located on the Oslofjord in southeastern Norway."},

    {q:"What is the Flåm Railway?", a:["A cable car","One of the steepest railway lines in the world","A fjord cruise","A hiking trail"], c:1, hint:"The train descends 866 metres in just 20 kilometres."},

const T = {
  nl: {
    trivia:'Trivia challenge', title:'World Explorer Quiz',
    subtitle:'Test je kennis over landen, hoofdsteden en geografie. Hoe snel ben jij?',
    labelNick:'Jouw nickname', placeholder:'bijv. WanderingJuanita',
    labelDiff:'Moeilijkheidsgraad', easy:'Makkelijk', medium:'Medium', hard:'Moeilijk',
    startBtn:'Begin de quiz',
    privacy:'Je nickname verschijnt op het gedeelde leaderboard. Er worden geen andere gegevens opgeslagen.',
    question:'Vraag', done:'Klaar!',
    score:'Score', correct:'Goed', streak:'Beste streak', avgTime:'Gem. tijd',
    saving:'Score opslaan...', saved:'Score opgeslagen!',
    saveFail:'Score kon niet worden opgeslagen: ',
    loading:'Scores laden...', lbFail:'Leaderboard kon niet worden geladen.',
    noScores:'Nog geen scores — jij bent de eerste!',
    back:'Terug', again:'Opnieuw', backLink:'← blog',
    correct_fb:(pts,hint)=>`Goed! +${pts} punten. ${hint}`,
    wrong_fb:(ans,hint)=>`Helaas. Juist antwoord: ${ans}. ${hint}`,
    result:(pct)=>pct>=80?'Indrukwekkend!':pct>=60?'Goed gespeeld!':'Blijf oefenen!',
    resultSub:(pct)=>`${pct}% goed — jouw score wordt opgeslagen.`,
  },
  en: {
    trivia:'Trivia challenge', title:'World Explorer Quiz',
    subtitle:'Test your knowledge of countries, capitals and geography. How fast are you?',
    labelNick:'Your nickname', placeholder:'e.g. WanderingJuanita',
    labelDiff:'Difficulty', easy:'Easy', medium:'Medium', hard:'Hard',
    startBtn:'Start the quiz',
    privacy:'Your nickname will appear on the shared leaderboard. No other data is stored.',
    question:'Question', done:'Done!',
    score:'Score', correct:'Correct', streak:'Best streak', avgTime:'Avg. time',
    saving:'Saving score...', saved:'Score saved!',
    saveFail:'Score could not be saved: ',
    loading:'Loading scores...', lbFail:'Leaderboard could not be loaded.',
    noScores:'No scores yet — you are the first!',
    back:'Back', again:'Play again', backLink:'← blog',
    correct_fb:(pts,hint)=>`Correct! +${pts} points. ${hint}`,
    wrong_fb:(ans,hint)=>`Wrong. Correct answer: ${ans}. ${hint}`,
    result:(pct)=>pct>=80?'Impressive!':pct>=60?'Well done!':'Keep practising!',
    resultSub:(pct)=>`${pct}% correct — your score is being saved.`,
  }
};

const DIFF = { easy:{count:10,time:20}, medium:{count:15,time:15}, hard:{count:20,time:10} };
const MEDALS = ['🥇','🥈','🥉'];

let lang = 'nl';
let nick = '', diff = 'medium', qList = [], currentQ = 0;
let score = 0, correct = 0, streak = 0, maxStreak = 0, times = [];
let timerInterval = null, timeLeft = 0;

function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById('btn-nl').classList.toggle('active', l === 'nl');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  applyTranslations();
}

function applyTranslations() {
  const t = T[lang];
  document.getElementById('label-trivia').textContent = t.trivia;
  document.getElementById('title-main').textContent = t.title;
  document.getElementById('subtitle-main').textContent = t.subtitle;
  document.getElementById('label-nick').textContent = t.labelNick;
  document.getElementById('nick-input').placeholder = t.placeholder;
  document.getElementById('label-diff').textContent = t.labelDiff;
  document.getElementById('diff-easy').textContent = t.easy;
  document.getElementById('diff-medium').textContent = t.medium;
  document.getElementById('diff-hard').textContent = t.hard;
  document.getElementById('start-btn').textContent = t.startBtn;
  document.getElementById('privacy-note').textContent = t.privacy;
  document.getElementById('label-done').textContent = t.done;
  document.getElementById('label-score').textContent = t.score;
  document.getElementById('label-correct').textContent = t.correct;
  document.getElementById('label-streak').textContent = t.streak;
  document.getElementById('label-time').textContent = t.avgTime;
  document.getElementById('btn-back').textContent = t.back;
  document.getElementById('btn-again').textContent = t.again;
  document.getElementById('back-link').textContent = t.backLink;
}

applyTranslations();

const nickInput = document.getElementById('nick-input');
const startBtn = document.getElementById('start-btn');
nickInput.addEventListener('input', function() {
  this.value = this.value.replace(/[^a-zA-Z0-9]/g, '');
  nick = this.value;
  startBtn.disabled = nick.length < 2;
});

document.querySelectorAll('.diff-btn').forEach(b => {
  b.addEventListener('click', function() {
    document.querySelectorAll('.diff-btn').forEach(x => x.classList.remove('selected'));
    this.classList.add('selected');
    diff = this.dataset.diff;
  });
});

startBtn.addEventListener('click', startGame);

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  const s = DIFF[diff];
  qList = shuffle(QUESTIONS[lang]).slice(0, s.count);
  currentQ = 0; score = 0; correct = 0; streak = 0; maxStreak = 0; times = [];
  show('screen-quiz');
  showQuestion();
}

function showQuestion() {
  const t = T[lang];
  const s = DIFF[diff];
  const q = qList[currentQ];
  document.getElementById('progress-fill').style.width = ((currentQ / qList.length) * 100) + '%';
  document.getElementById('q-count').textContent = `${t.question} ${currentQ + 1} / ${qList.length}`;
  document.getElementById('question-text').textContent = q.q;
  const fb = document.getElementById('feedback-box');
  fb.textContent = ''; fb.className = 'feedback-box';
  const grid = document.getElementById('answers-grid');
  grid.innerHTML = '';
  q.a.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = ans;
    btn.addEventListener('click', () => answer(i));
    grid.appendChild(btn);
  });
  timeLeft = s.time;
  updateTimer();
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) { clearInterval(timerInterval); answer(-1); }
  }, 1000);
}

function updateTimer() {
  const el = document.getElementById('timer');
  el.textContent = timeLeft + 's';
  el.className = 'timer-pill' + (timeLeft <= 5 ? ' urgent' : '');
}

function answer(idx) {
  clearInterval(timerInterval);
  const t = T[lang];
  const q = qList[currentQ];
  const s = DIFF[diff];
  times.push(s.time - timeLeft);
  const btns = document.getElementById('answers-grid').querySelectorAll('.ans-btn');
  btns.forEach(b => b.disabled = true);
  const fb = document.getElementById('feedback-box');
  if (idx === q.c) {
    btns[idx].classList.add('correct');
    correct++; streak++;
    if (streak > maxStreak) maxStreak = streak;
    const pts = Math.round(100 + (timeLeft / s.time) * 100);
    score += pts;
    fb.textContent = t.correct_fb(pts, q.hint);
    fb.className = 'feedback-box correct';
  } else {
    if (idx >= 0) btns[idx].classList.add('wrong');
    btns[q.c].classList.add('correct');
    streak = 0;
    fb.textContent = t.wrong_fb(q.a[q.c], q.hint);
    fb.className = 'feedback-box wrong';
  }
  setTimeout(() => {
    currentQ++;
    if (currentQ < qList.length) showQuestion();
    else endGame();
  }, 2000);
}

async function endGame() {
  const t = T[lang];
  const avgTime = times.length > 0 ? Math.round(times.reduce((a, b) => a + b, 0) / times.length) : 0;
  const pct = Math.round((correct / qList.length) * 100);
  document.getElementById('result-heading').textContent = t.result(pct);
  document.getElementById('result-sub').textContent = t.resultSub(pct);
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-correct').textContent = `${correct}/${qList.length}`;
  document.getElementById('res-streak').textContent = maxStreak;
  document.getElementById('res-time').textContent = avgTime + 's';
  document.getElementById('lb-diff-label').textContent = diff;
  document.getElementById('score-saving').textContent = t.saving;
  document.getElementById('error-msg').style.display = 'none';
  document.getElementById('lb-body').innerHTML = `<div class="lb-loading">${t.loading}</div>`;
  show('screen-result');
  try {
    const res = await fetch(API_BASE, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname: nick, score, difficulty: diff, correct, total: qList.length })
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error((err.error || 'Failed') + (err.detail ? ': ' + err.detail : ''));
    }
    document.getElementById('score-saving').textContent = t.saved;
  } catch (e) {
    document.getElementById('score-saving').textContent = '';
    const errEl = document.getElementById('error-msg');
    errEl.textContent = t.saveFail + e.message;
    errEl.style.display = 'block';
  }
  loadLeaderboard();
}

async function loadLeaderboard() {
  const t = T[lang];
  const body = document.getElementById('lb-body');
  try {
    const res = await fetch(`${API_BASE}?difficulty=${diff}`);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (!data.length) {
      body.innerHTML = `<div class="lb-loading">${t.noScores}</div>`;
      return;
    }
    body.innerHTML = data.map((entry, i) => `
      <div class="lb-row${entry.nickname === nick && entry.score === score ? ' mine' : ''}">
        <span class="lb-rank">${MEDALS[i] || (i + 1)}</span>
        <span class="lb-name">${entry.nickname}</span>
        <span class="lb-score">${entry.score}</span>
      </div>
    `).join('');
  } catch (e) {
    body.innerHTML = `<div class="lb-loading">${t.lbFail}</div>`;
  }
}

function goToNick() { show('screen-nick'); }
function restart() { startGame(); }
</script>
